<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">

  <!--
    Pen drawn in upright orientation (nib pointing down),
    then rotated 45 ° clockwise so the nib points to the lower-left,
    matching the reference image angle.
    All parts use fill="white".
  -->
  <g transform="rotate(45, 16, 16)" fill="white">

    <!-- ① Top clicker button -->
    <rect x="14.5" y="0.5" width="3" height="3.5" rx="1.5"/>

    <!-- ② Cap section (slightly wider than the barrel) -->
    <rect x="12.5" y="3.5" width="7" height="5.5" rx="1.5"/>

    <!-- ③ Clip — runs along the right side of the cap and barrel -->
    <rect x="18.8" y="4.5" width="2" height="12" rx="1"/>

    <!-- ④ Main barrel -->
    <rect x="13" y="8.5" width="6" height="10.5"/>

    <!-- ⑤ Grip collar (slightly wider band before the nib) -->
    <rect x="12" y="18.5" width="8" height="3" rx="0.5"/>

    <!-- ⑥ Nib — tapers to a sharp point -->
    <path d="M12 21.5 L16 30.5 L20 21.5 Z"/>

  </g>

  <!--
    Cursive squiggle near the nib tip.
    After the 45 ° rotation the nib lands at approximately (6, 26),
    so the signature flows from there toward the right.
  -->
  <path
    d="M4 27.5 C5.5 25 7.5 28 9.5 26 C11 24.5 12 27.5 13.5 26 C14.5 25 15.5 26 16.5 25.5"
    stroke="white" stroke-width="1.2" fill="none"
    stroke-linecap="round" stroke-linejoin="round"/>

</svg>
